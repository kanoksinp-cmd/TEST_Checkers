<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หมากฮอสไทย 3D ออนไลน์</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; font-family: 'Sarabun', sans-serif; }
        body { overflow: hidden; background-color: #111111; position: fixed; width: 100%; height: 100%; }
        #turn-display-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 6px; width: 90%; max-width: 450px; }
        #turn-display { padding: 10px 20px; font-size: 16px; font-weight: 700; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.4s; text-align: center; width: 100%; }
        .turn-red { background: linear-gradient(135deg, #d63031, #8e0000); color: #fff; border: 2px solid #ff7675; }
        .turn-green { background: linear-gradient(135deg, #2ecc71, #1b5e20); color: #fff; border: 2px solid #2ecc71; }
        #combo-timer-display { display: none; background: rgba(255, 71, 87, 0.9); color: white; padding: 6px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        #control-panel { position: absolute; top: 0; left: 0; width: 100%; max-width: 340px; height: 100%; background: rgba(15, 18, 26, 0.96); z-index: 100; transition: transform 0.4s; overflow-y: auto; padding: 25px; color: #f5f6fa; }
        #control-panel.collapsed { transform: translateX(-100%); }
        .side-nametag { position: absolute; left: 50%; transform: translateX(-50%); padding: 6px 16px; font-size: 14px; font-weight: 700; border-radius: 6px; color: #fff; background: rgba(30, 30, 30, 0.85); z-index: 5; }
        #nametag-top { top: 85px; } #nametag-bottom { bottom: 85px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="turn-display-container">
        <div id="turn-display" class="turn-red">กำลังจัดเตรียมกระดาน...</div>
        <div id="combo-timer-display">⚡ ต้องกินต่อ!</div>
    </div>

    <div id="nametag-top" class="side-nametag">ฝั่งตรงข้าม</div>
    <div id="nametag-bottom" class="side-nametag">ตัวคุณ</div>

    <div id="control-panel" class="collapsed">
        <h2 id="h2h-title">หมากฮอสไทย 3D</h2>
        <div id="server-status">กำลังตรวจสอบการเชื่อมต่อ...</div>
        </div>

    <script>
        // --- ส่วนแก้ไข: ป้องกันหน้าจอดำจาก Socket ---
        let socket = null;
        try {
            socket = io({ transports: ['websocket'], timeout: 3000 });
            socket.on('connect', () => { document.getElementById('server-status').innerText = '🟢 เชื่อมต่อเซิร์ฟเวอร์สำเร็จ'; });
            socket.on('connect_error', () => { document.getElementById('server-status').innerText = '🔴 โหมดออฟไลน์ (AI/Local)'; });
        } catch (e) {
            console.warn("Socket library not loaded");
        }

        // --- โค้ดเดิมของคุณ (นำมาใส่ต่อจากบรรทัดนี้ได้เลยครับ) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // [ใส่ฟังก์ชัน drawPieces, animate, และ Logic เกมทั้งหมดของคุณที่นี่]
        
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
