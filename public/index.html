<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หมากฮอสไทย 3D พรีเมียม - ลายไม้สมจริง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #0b0806;
            position: fixed;
            width: 100%;
            height: 100%;
            transition: background-color 0.8s ease;
        }

        #turn-display-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 90%;
            max-width: 450px;
        }

        #turn-display {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            width: 100%;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        @media (min-width: 480px) {
            #turn-display {
                font-size: 18px;
                padding: 14px 40px;
            }
        }

        .turn-red {
            background: linear-gradient(135deg, rgba(255, 30, 30, 0.9), rgba(184, 29, 19, 0.95));
            color: #ffffff;
            border: 1px solid rgba(255, 120, 120, 0.5);
            box-shadow: 0 8px 32px rgba(255, 30, 30, 0.35);
        }

        .turn-blue {
            background: linear-gradient(135deg, rgba(160, 110, 70, 0.95), rgba(90, 55, 30, 0.95));
            color: #ffffff;
            border: 1px solid rgba(230, 190, 150, 0.5);
            box-shadow: 0 8px 32px rgba(138, 90, 54, 0.35);
        }

        #combo-timer-display {
            display: none;
            background: rgba(255, 46, 46, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(255, 46, 46, 0.4);
            animation: pulse-border 1s infinite;
        }

        @keyframes pulse-border {
            0% { opacity: 0.85; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.85; transform: scale(1); }
        }

        #login-shortcut-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 18, 12, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(210, 180, 140, 0.35);
            color: #e6c594;
            padding: 9px 16px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #login-shortcut-btn:hover {
            background: rgba(230, 197, 148, 0.2);
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(210, 180, 140, 0.5);
            transform: translateY(-2px);
        }

        #zoom-controls {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .zoom-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(26, 18, 12, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        .zoom-btn:active {
            transform: scale(0.85);
            background: #e6c594;
            color: #111111;
            border-color: #e6c594;
            box-shadow: 0 0 15px rgba(230, 197, 148, 0.6);
        }

        #control-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            max-width: 340px;
            height: 100%;
            background: rgba(22, 16, 12, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            color: #f5f6fa;
            z-index: 100;
            transition: transform 0.45s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 10px 0 40px rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
        }

        #control-panel.collapsed {
            transform: translateX(-100%);
        }

        #panel-toggle-trigger {
            position: fixed;
            top: 72px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(22, 16, 12, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(230, 197, 148, 0.25);
            color: #e6c594;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: all 0.45s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 101;
        }

        #panel-toggle-trigger:hover {
            color: #ffd700;
            border-color: #ffd700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(230, 197, 148, 0.4);
            transform: scale(1.08);
        }

        #panel-toggle-trigger:active {
            transform: scale(0.92);
        }

        h2 {
            color: #e6c594;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(230, 197, 148, 0.3);
        }

        h3 {
            color: #00a8ff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            border-left: 3px solid #00a8ff;
            padding-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.02);
            transition: all 0.3s;
        }

        .section:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }

        label {
            display: block;
            font-size: 11px;
            margin-bottom: 6px;
            color: #a4b0be;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            background: #0f0b08;
            border: 1px solid rgba(255,255,255,0.12);
            color: #ffffff;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: #e6c594;
            box-shadow: 0 0 8px rgba(230, 197, 148, 0.25);
        }

        button {
            width: 100%;
            padding: 11px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e6c594, #c2a170);
            color: #0f0b08;
            margin-top: 5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 197, 148, 0.4);
        }

        .btn-danger {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
            margin-top: 8px;
            padding: 8px;
            font-size: 11px;
        }

        .btn-danger:hover {
            background: #ff4757;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }

        #server-status {
            font-size: 11px;
            text-align: center;
            color: #a4b0be;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #friend-select-section {
            display: none;
        }

        #game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(26, 18, 12, 0.95);
            backdrop-filter: blur(12px);
            border: 2px solid #e6c594;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 60px rgba(230, 197, 148, 0.4);
            width: 85%;
            max-width: 380px;
            animation: modalFadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalFadeIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h1 {
            color: #fff;
            font-size: 26px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .modal-content p {
            color: #e6c594;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(230, 197, 148, 0.3);
        }

        .btn-restart {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #111;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 50px;
            box-shadow: 0 6px 25px rgba(241, 196, 15, 0.45);
        }

        .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(241, 196, 15, 0.6);
        }

        .side-nametag {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 5;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid transparent;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        #nametag-top { top: 130px; background: rgba(30, 24, 20, 0.85); border-color: rgba(230, 190, 150, 0.25); }
        #nametag-bottom { bottom: 130px; background: rgba(30, 24, 20, 0.85); border-color: rgba(230, 190, 150, 0.25); }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="turn-display-container">
        <div id="turn-display" class="turn-red">กำลังจัดเตรียมกระดาน...</div>
        <div id="combo-timer-display">⚡ ต้องกินต่อ! เวลาที่เหลือ: 5.0 วินาที</div>
    </div>

    <div id="nametag-top" class="side-nametag">ฝั่งตรงข้าม</div>
    <div id="nametag-bottom" class="side-nametag">ตัวคุณ</div>

    <div id="zoom-controls">
        <div class="zoom-btn" onclick="zoomGame(-1.5); SoundEffects.playClick();">＋</div>
        <div class="zoom-btn" onclick="zoomGame(1.5); SoundEffects.playClick();">－</div>
    </div>

    <button id="login-shortcut-btn" onclick="toggleMainPanel(); SoundEffects.playClick();">👤 จัดการโปรไฟล์ / เข้าสู่ระบบ</button>

    <div id="game-over-modal">
        <div class="modal-content">
            <h1>🎉 จบการแข่งขัน 🎉</h1>
            <p id="winner-text">ฝ่ายสีแดง ชนะ!</p>
            <button class="btn-restart" onclick="restartFromModal();">🏁 เล่นอีกครั้ง</button>
        </div>
    </div>

    <button id="panel-toggle-trigger" onclick="toggleMainPanel(); SoundEffects.playClick();">☰</button>
    <div id="control-panel" class="collapsed">
        <h2>หมากฮอสไทย 3D</h2>
        <p style="font-size:11px; text-align:center; color:#95a5a6; margin-top:-5px;">ระบบออนไลน์ Real-time</p>

        <div class="section">
            <h3>👤 โปรไฟล์ผู้เล่น</h3>
            <div id="auth-section">
                <input type="text" id="username-input" placeholder="พิมพ์ชื่อภาษาอังกฤษ..." maxlength="15">
                <button class="btn-primary" onclick="registerPlayer();">เข้าสู่ระบบออนไลน์</button>
            </div>
            <div id="profile-section" style="display: none; text-align: center;">
                <p>ชื่อผู้เล่น: <strong id="user-display" style="color:#ffd700;">-</strong></p>
            </div>
        </div>

        <div class="section">
            <h3>🎮 โหมดการเล่น</h3>
            <select id="game-mode-select" onchange="changeGameMode(this.value);">
                <option value="bot" selected>🤖 สู้กับบอท (AI Computer)</option>
                <option value="local">👥 เล่นสองคนบนเครื่องเดียวกัน</option>
                <option value="online">🌐 ประลองออนไลน์ข้ามเครื่อง</option>
            </select>
        </div>

        <div class="section" id="friend-select-section">
            <h3>⚔️ เลือกท้าดวลผู้เล่น</h3>
            <select id="friend-list-select" onchange="challengeSelectedPlayer(this.value);">
                <option value="">--ไม่มีคนออนไลน์--</option>
            </select>
        </div>

        <button class="btn-primary" style="background: #f39c12; color:#111;" onclick="resetGame();">🏁 รีเซ็ตกระดาน</button>
        <div id="server-status">กำลังเชื่อมต่อเซิร์ฟเวอร์...</div>
    </div>

    <script>
        // ==========================================
        //  [ เชื่อมต่อระบบเครือข่าย Socket.io ]
        // ==========================================
        const socket = io(); // เปิดการเชื่อมต่อ
        let myUsername = "";
        let opponentName = "";
        let gameMode = "bot";
        let myRole = "red"; // red หรือ blue

        socket.on('connect', () => {
            document.getElementById('server-status').innerText = "🟢 เซิร์ฟเวอร์ออนไลน์";
            document.getElementById('server-status').style.color = "#2ecc71";
            
            // ตรวจสอบชื่อเดิมในเครื่อง
            const savedName = localStorage.getItem('checkers_username');
            if(savedName) {
                document.getElementById('username-input').value = savedName;
                registerPlayer();
            }
        });

        function toggleMainPanel() {
            document.getElementById('control-panel').classList.toggle('collapsed');
        }

        function registerPlayer() {
            const input = document.getElementById('username-input').value.trim();
            if(!input) return alert("กรุณากรอกชื่อผู้เล่น");
            
            myUsername = input;
            localStorage.setItem('checkers_username', myUsername);
            
            // ส่งขึ้นระบบหลังบ้าน
            socket.emit('registerPlayer', myUsername);

            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('user-display').innerText = myUsername;
        }

        function changeGameMode(mode) {
            gameMode = mode;
            if(mode === 'online') {
                document.getElementById('friend-select-section').style.display = 'block';
            } else {
                document.getElementById('friend-select-section').style.display = 'none';
                opponentName = "";
            }
            resetGame();
        }

        function challengeSelectedPlayer(targetUser) {
            if(!targetUser) return;
            opponentName = targetUser;
            myRole = "red"; // ผู้ท้าชิงได้ฝั่งสีแดงเสมอ
            
            socket.emit('challengePlayer', {
                target: targetUser,
                challenger: myUsername,
                challengerColor: 'red'
            });
            alert(`⚔️ ส่งคำท้าไปหาคุณ [${targetUser}] แล้ว รอการตอบกลับ...`);
        }

        // จัดการเมื่อมีคำท้าดวลส่งมาหาเรา
        socket.on('incomingChallenge', (data) => {
            const accept = confirm(`⚔️ คุณ [${data.challenger}] ท้าแข่งหมากฮอส 3D กับคุณ! คุณจะรับคำท้าหรือไม่?`);
            if(accept) {
                opponentName = data.challenger;
                myRole = "blue"; // ผู้รับคำท้าได้ฝั่งสีน้ำตาล (blue ในระบบโค้ด)
                
                socket.emit('acceptChallenge', {
                    target: data.challenger,
                    responder: myUsername,
                    responderColor: 'blue'
                });
                
                alert(`🎮 เริ่มเกม! คุณได้คุมฝั่ง [🟤 สีน้ำตาล] กล้องกำลังสลับมุมมองให้คุณ`);
                resetGame();
            }
        });

        // จัดการเมื่อเป้าหมายกดตกลงรับคำท้าของเรา
        socket.on('challengeAccepted', (data) => {
            alert(`🎉 คุณ [${data.responder}] รับคำท้าแล้ว! เริ่มเกมได้!`);
            opponentName = data.responder;
            myRole = "red"; // ตัวเราเป็นผู้ท้าได้สีแดง
            resetGame();
        });

        // คอยดักฟังรายชื่อเพื่อนำมาใส่ในแท็ก Dropdown
        socket.on('updatePlayers', (playersList) => {
            const select = document.getElementById('friend-list-select');
            select.innerHTML = '<option value="">-- เลือกผู้เล่นที่จะท้าดวล --</option>';
            
            playersList.forEach(player => {
                if(player.username.toLowerCase() !== myUsername.toLowerCase()) {
                    const opt = document.createElement('option');
                    opt.value = player.username;
                    opt.innerText = `👤 ${player.username}`;
                    select.appendChild(opt);
                }
            });
        });

        socket.on('playerDisconnected', (data) => {
            if(gameMode === 'online' && data.username === opponentName) {
                alert(`❌ คู่ต่อสู้ [${data.username}] ออกจากเกมหรือหลุดการเชื่อมต่อ`);
                changeGameMode('bot');
                document.getElementById('game-mode-select').value = 'bot';
            }
        });

        // ดักฟังการเดินหมากเมื่ออีกฝั่งขยับ
        socket.on('pieceMoved', (data) => {
            // โค้ดส่วนนี้จะทำงานร่วมกับเอนจิ้น Three.js ของคุณ เพื่ออัปเดตและทำอนิเมชันหมาก
            console.log("คู่ต่อสู้เดินหมาก:", data);
            // โครงสร้างฟังก์ชันจำลอง: executeOpponentMove(data.sR, data.sC, data.eR, data.eC, data.result);
        });

        // สั่งส่งพิกัดการเดินหมากของเราให้เซิร์ฟเวอร์ส่งต่อ
        function networkSendMove(sR, sC, eR, eC, result) {
            if(gameMode === 'online' && opponentName) {
                socket.emit('movePiece', {
                    target: opponentName,
                    sR: sR, sC: sC, eR: eR, eC: eC,
                    result: result
                });
            }
        }

        // ==========================================
        //  [ โครงสร้างระบบกราฟิก Three.js (ย่อส่วน) ]
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        function zoomGame(val) {
            camera.position.y += val;
            camera.lookAt(0,0,0);
        }

        function resetGame() {
            console.log("รีเซ็ตสถานะและสร้างกระดานหมากใหม่...");
            document.getElementById('game-over-modal').style.display = 'none';
            
            // ปรับมุมกล้องตามบทบาท (Role) ฝั่งของตนเอง
            if(gameMode === 'online' && myRole === 'blue') {
                camera.position.set(0, 10, -10); // มองจากด้านบนฝั่งตรงข้าม
            } else {
                camera.position.set(0, 10, 10);  // มองจากด้านบนฝั่งผู้เล่นหลัก
            }
            camera.lookAt(0, 0, 0);
            document.getElementById('turn-display').innerText = "🔴 ตาของฝ่ายสีแดง";
        }

        function restartFromModal() {
            resetGame();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // เริ่มต้นเกมจำลองเสียงคลิกและเปิดลูปหน้าจอ
        const SoundEffects = { playClick: () => {} };
        resetGame();
        animate();
    </script>
</body>
</html>
